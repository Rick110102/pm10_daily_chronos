  <style>
    :root {
      --bg:     #E3E3E3;
      --panel:  #F5F5F5;
      --border: #1e2d3d;
      --accent: #000000;
      --text:   #c9d8e8;
      --muted:  #4a6070;
      --legend: #F5F5F5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%; background:var(--bg);
      color:var(--text); font-family:'Barlow',sans-serif;
      overflow:hidden;
    }
    header {
      height:48px; flex-shrink:0;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      padding:0 20px;
      display:flex; align-items:center; gap:16px;
    }
    .logo {
      font-family:'Share Tech Mono',monospace;
      font-size:20px; color:var(--accent); letter-spacing:2px;
    }
    .hdr-right {
      margin-left:auto;
      font-family:'Share Tech Mono',monospace;
      font-size:11px; color:var(--muted);
      display:flex; gap:20px;
    }
    .hdr-right span { color:var(--accent); }
    .body {
      display:grid;
      grid-template-columns: 40% 60%;
      grid-template-rows: calc(100vh - 84px) 36px;
      height:calc(100vh - 48px);
    }
    .charts-panel {
      grid-column:1; grid-row:1;
      display:flex; flex-direction:column;
      overflow:hidden;
      border-right:1px solid var(--border);
      background:var(--bg);
    }
    .charts-scroll {
      flex:1; overflow-y:auto;
      padding:8px 10px;
      display:flex; flex-direction:column; gap:6px;
    }
    .chart-block { flex-shrink:0; }
    .chart-label {
      font-family:'Share Tech Mono',monospace;
      font-size:12px; color:var(--accent);
      letter-spacing:1px; margin-bottom:2px;
      padding-left:2px;
    }
    .plotly-div { width:100%; height:180px; }
    .map-panel {
      grid-column:2; grid-row:1;
      overflow:hidden; position:relative;
    }
    .map-panel .folium-map {
      width:100% !important;
      height:100% !important;
    }
    .legend-charts {
      grid-column:1; grid-row:2;
      background:var(--legend);
      border-top:1px solid var(--border);
      border-right:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:center;
      padding:0 10px; gap:16px;
      font-family:'Share Tech Mono',monospace;
      font-size:9px; color:var(--muted);
    }
    #cards-overlay {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 6px;
      z-index: 1000;
      pointer-events: none;
    }
    .prom-card {
      background: rgba(245,245,245,0.88);
      border: 1px solid #1e2d3d;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #1a1a1a;
      white-space: nowrap;
    }
    .prom-card .est-nombre {
      font-weight: 600;
      color: #000000;
    }
    .prom-card .est-valor {
      font-weight: 600;
      color: #0070A3;
    }
    .li { display:flex; align-items:center; gap:5px; }
    .line-solid { width:20px; height:2px; background:#283552; }
    .line-pron  { width:20px; height:2px; background:#0070A3; }
    .line-corte { width:2px; height:12px; background:#E88D00; }
    .dot-max    { width:8px; height:8px; border-radius:50%; background:#850B0B; }
    .legend-map {
      grid-column:2; grid-row:2;
      background:var(--legend);
      border-top:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:center;
      padding:0 14px; gap:16px;
      font-family:'Share Tech Mono',monospace;
      font-size:9px; color:var(--muted);
    }
    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>

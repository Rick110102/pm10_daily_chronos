  <style>
    :root {
      --bg:     #E3E3E3;
      --panel:  #F5F5F5;
      --border: #1e2d3d;
      --accent: #000000;
      --text:   #c9d8e8;
      --muted:  #4a6070;
      --legend: #F5F5F5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%; background:var(--bg);
      color:var(--text); font-family:'Barlow',sans-serif;
      overflow:hidden;
    }
    header {
      height:48px; flex-shrink:0;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      padding:0 20px;
      display:flex; align-items:center; gap:16px;
    }
    .logo {
      font-family:'Share Tech Mono',monospace;
      font-size:20px; color:var(--accent); letter-spacing:2px;
    }
    .hdr-right {
      margin-left:auto;
      font-family:'Share Tech Mono',monospace;
      font-size:11px; color:var(--muted);
      display:flex; gap:20px;
    }
    .hdr-right span { color:var(--accent); }
    .body {
      display:grid;
      grid-template-columns: 40% 60%;
      grid-template-rows: calc(100vh - 84px) 36px;
      height:calc(100vh - 48px);
    }
    .charts-panel {
      grid-column:1; grid-row:1;
      display:flex; flex-direction:column;
      overflow:hidden;
      border-right:1px solid var(--border);
      background:var(--bg);
    }
    .charts-scroll {
      flex:1; overflow-y:auto;
      padding:8px 10px;
      display:flex; flex-direction:column; gap:6px;
    }
    .chart-block { flex-shrink:0; }
    .chart-label {
      font-family:'Share Tech Mono',monospace;
      font-size:12px; color:var(--accent);
      letter-spacing:1px; margin-bottom:2px;
      padding-left:2px;
    }
    .plotly-div { width:100%; height:180px; }
    .map-panel {
      grid-column:2; grid-row:1;
      overflow:hidden; position:relative;
    }
    .map-panel .folium-map {
      width:100% !important;
      height:100% !important;
    }
    .legend-charts {
      grid-column:1; grid-row:2;
      background:var(--legend);
      border-top:1px solid var(--border);
      border-right:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:center;
      padding:0 10px; gap:16px;
      font-family:'Share Tech Mono',monospace;
      font-size:9px; color:var(--muted);
    }
    #cards-overlay {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 6px;
      z-index: 1000;
      pointer-events: none;
    }
    .prom-card {
      background: rgba(245,245,245,0.88);
      border: 1px solid #1e2d3d;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #1a1a1a;
      white-space: nowrap;
    }
    .prom-card .est-nombre {
      font-weight: 600;
      color: #000000;
    }
    .prom-card .est-valor {
      font-weight: 600;
      color: #0070A3;
    }
    .li { display:flex; align-items:center; gap:5px; }
    .line-solid { width:20px; height:2px; background:#283552; }
    .line-pron  { width:20px; height:2px; background:#0070A3; }
    .line-corte { width:2px; height:12px; background:#E88D00; }
    .dot-max    { width:8px; height:8px; border-radius:50%; background:#850B0B; }
    .legend-map {
      grid-column:2; grid-row:2;
      background:var(--legend);
      border-top:1px solid var(--border);
      display:flex; align-items:center;
      justify-content:center;
      padding:0 14px; gap:16px;
      font-family:'Share Tech Mono',monospace;
      font-size:9px; color:var(--muted);
    }
    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>

    <div class="li"><div class="dot" style="background:#ef4444"></div><span>&gt; 100 μg/m³ Muy Alto</span></div>
    <div class="li">Buffer: Dos Cruces / Tucush / Q-Taj-Prima / Quebrada = 1km</div>
  </div>

</div>

<script>
const CHART_DATA = [{"nombre": "Q-Taj Prima", "color": "#22c55e", "obs": [], "pron": [], "avg_val": 0, "max_val": 0, "max_time": null, "eje_x": ["00:00", "01:00", "02:00", "03:00", "04:00", "05:00", "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"]}, {"nombre": "Dos Cruces", "color": "#22c55e", "obs": [], "pron": [], "avg_val": 0, "max_val": 0, "max_time": null, "eje_x": ["00:00", "01:00", "02:00", "03:00", "04:00", "05:00", "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"]}, {"nombre": "Quebrada", "color": "#22c55e", "obs": [], "pron": [], "avg_val": 0, "max_val": 0, "max_time": null, "eje_x": ["00:00", "01:00", "02:00", "03:00", "04:00", "05:00", "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"]}, {"nombre": "Tucush", "color": "#22c55e", "obs": [], "pron": [], "avg_val": 0, "max_val": 0, "max_time": null, "eje_x": ["00:00", "01:00", "02:00", "03:00", "04:00", "05:00", "06:00", "07:00", "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"]}];
const HORA_CORTE = "00:00";
const EJE_X_FIJO = CHART_DATA[0].eje_x;

const LAYOUT_BASE = {
  paper_bgcolor: '#E3E3E3',
  plot_bgcolor:  '#E3E3E3',
  font:   { family:'Share Tech Mono, monospace', size:9, color:'#c9d8e8' },
  margin: { t:8, r:8, b:38, l:40 },
  xaxis: {
    showgrid:true, gridcolor:'#BBBBBB', gridwidth:1,
    tickfont:{ size:9 }, color:'#333333', tickangle:-45,
    type:'category',
    categoryorder:'array',
    categoryarray: EJE_X_FIJO,
    range: [-0.5, EJE_X_FIJO.length - 0.5],
  },
  yaxis: {
    showgrid:true, gridcolor:'#BBBBBB', gridwidth:1,
    tickfont:{ size:9 }, color:'#333333', rangemode:'tozero',
    title:{ text:'μg/m³', font:{ size:9, color:'#292929' } }
  },
  showlegend: false,
};

const scroll = document.getElementById('charts-scroll');

const overlay = document.getElementById('cards-overlay');
CHART_DATA.forEach(e => {
  const card = document.createElement('div');
  card.className = 'prom-card';
  card.innerHTML = `<span class="est-nombre">${e.nombre}</span>
                    &nbsp;:&nbsp;
                    <span class="est-valor">${e.avg_val.toFixed(2)} μg/m³</span>`;
  overlay.appendChild(card);
});

CHART_DATA.forEach((est, i) => {
  const block = document.createElement('div');
  block.className = 'chart-block';
  const label = document.createElement('div');
  label.className = 'chart-label';
  label.textContent = '📍 ' + est.nombre;
  const div = document.createElement('div');
  div.className = 'plotly-div';
  div.id = 'ch' + i;
  block.appendChild(label);
  block.appendChild(div);
  scroll.appendChild(block);

  const traces = [];

  if (est.obs.length) {
    traces.push({
      x: est.obs.map(d => d.x),
      y: est.obs.map(d => d.y),
      type:'scatter', mode:'lines+markers',
      line:{ color:'#283552', width:1.5 },
      marker:{
        color: '#283552',
        size: 4,
        symbol: 'circle',
      },
      hovertemplate:'%{x}<br>%{y:.2f} μg/m³<extra></extra>',
    });
  }

  if (est.pron.length) {
    traces.push({
      x: est.pron.map(d => d.x),
      y: est.pron.map(d => d.y),
      type:'scatter', mode:'lines+markers',
      line:{ color:'#0070A3', width:1.5 },
      marker:{
        color: '#0070A3',
        size:4,
        symbol:'circle'
      },
      hovertemplate:'%{x}<br>%{y:.2f} μg/m³<extra></extra>',
    });
  }

  if (est.max_time) {
    traces.push({
      x:[est.max_time], y:[est.max_val],
      type:'scatter', mode:'markers+text',
      marker:{ color:'#850B0B', size:8, symbol:'circle',
                line:{ color:'#fff', width:1 } },
      text:[est.max_val.toFixed(2)],
      textposition:'bottom center',
      textfont:{ color:'#850B0B', size:12 },
      hovertemplate:'Máx: %{y:.2f} μg/m³<extra></extra>',
    });
  }

  const layout = JSON.parse(JSON.stringify(LAYOUT_BASE));
  layout.shapes = [{
    type:'line',
    x0:HORA_CORTE, x1:HORA_CORTE,
    y0:0, y1:1, yref:'paper',
    line:{ color:'#E88D00', width:1.8, dash:'dash' }
  }];
  layout.annotations = [];

  Plotly.newPlot('ch'+i, traces, layout, {
    responsive:true, displayModeBar:false
  });
});

setTimeout(function() {
  if (window.L) {
    Object.keys(window).forEach(function(k) {
      if (k.startsWith('map_') && window[k] && window[k].invalidateSize) {
        try { window[k].invalidateSize(); } catch(e) {}
      }
    });
  }
}, 500);
</script>
</body>
</html>
